name: Build and Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux and package
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Build release
        run: cargo build --release --locked

      - name: Package artifacts (Linux)
        run: |
          set -eux
          BINARY=""
          if [ -f target/release/KanshiUI ]; then BINARY=KanshiUI; elif [ -f target/release/kanshiui ]; then BINARY=kanshiui; else echo "binary not found"; ls target/release; exit 1; fi
          mkdir -p dist
          # plain binary and tarball
          cp target/release/$BINARY dist/kanshiui-${VERSION}-linux
          tar -C target/release -czf dist/kanshiui-${VERSION}-linux.tar.gz $BINARY

          # deb (cargo-deb)
          cargo install cargo-deb --locked || true
          # Use the Git tag version (strip leading 'v') for the .deb package
          cargo deb --no-build --deb-version ${VERSION#v} || true
          if ls target/debian/*.deb 1> /dev/null 2>&1; then cp target/debian/*.deb dist/; fi

          # rpm via fpm
          sudo apt-get update
          sudo apt-get install -y ruby-dev build-essential rpm
          sudo gem install --no-document fpm
          mkdir -p package/usr/local/bin
          cp target/release/$BINARY package/usr/local/bin/kanshiui
          fpm -s dir -t rpm -n kanshiui -v ${VERSION#v} -C package usr/local/bin/kanshiui || true
          if ls *.rpm 1> /dev/null 2>&1; then mv *.rpm dist/ || true; fi

          # Arch tarball with PKGBUILD (so users can build with makepkg)
          mkdir -p pkgbuild
          cp target/release/$BINARY pkgbuild/kanshiui
          cat > pkgbuild/PKGBUILD <<'EOF'
          pkgname=kanshiui
          pkgver=${VERSION#v}
          pkgrel=1
          pkgdesc="KanshiUI"
          arch=('x86_64')
          url="https://github.com/${{ github.repository }}"
          license=('GPL')
          source=('kanshiui')
          sha256sums=('SKIP')
          package() {
            # $srcdir and $pkgdir are evaluated by makepkg, not by this workflow shell.
            install -Dm755 "$srcdir/kanshiui" "$pkgdir/usr/bin/kanshiui"
          }
          EOF
          tar -C pkgbuild -cJf dist/kanshiui-${VERSION}-arch.tar.xz .

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist

  release:
    name: Create GitHub Release and upload artifacts
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4


      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: ./dist

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Copy all files from dist (recursively) into release-assets root.
          # Avoid using -maxdepth so we don't miss files nested deeper.
          find dist -type f -print0 | xargs -0 -I{} cp -v {} release-assets/ || true
          echo "Contents of release-assets:"
          ls -la release-assets || true

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eux
          # The upload_url output may contain a template like '{?name,label}' - strip it
          upload_url="${{ steps.create_release.outputs.upload_url }}"
          upload_url="${upload_url%\{*}"

          echo "Contents of dist:"
          ls -la dist || true
          echo "Contents of release-assets:"
          ls -la release-assets || true

          # Query the release to find existing assets and avoid duplicate uploads
          echo "Querying release for tag $TAG"
          release_json=$(curl -sS -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/$REPO/releases/tags/$TAG")
          echo "$release_json" > /tmp/release.json || true
          release_id=$(echo "$release_json" | python3 -c 'import sys,json; j=json.load(sys.stdin); print(j.get("id",""))')
          echo "Release id: $release_id"

          existing_assets=$(echo "$release_json" | python3 -c 'import sys,json; j=json.load(sys.stdin); print("\n".join(a["name"]+"\t"+str(a["id"]) for a in j.get("assets",[])))') || true
          echo "Existing assets:\n$existing_assets" || true

          # Build a unique upload directory to avoid duplicating names from multiple source dirs
          upload_dir=release-upload
          rm -rf "$upload_dir"
          mkdir -p "$upload_dir"
          for src in dist release-assets; do
            if [ -d "$src" ]; then
              for f in "$src"/*; do
                [ -f "$f" ] || continue
                # Copy without clobber so duplicates are ignored
                cp -n "$f" "$upload_dir/" || true
              done
            fi
          done

          echo "Files to upload:" && ls -la "$upload_dir" || true

          failed=0
          for f in "$upload_dir"/*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")

            # Skip if release already contains an asset with the same name
            if printf '%s
' '| sed -n '1,${p;}' >/dev/null 2>&1; then
              :
            fi
            if printf '%s
              echo "Skipping $name (already exists in release)"
              continue
            fi

            tries=0
            until [ "$tries" -ge 3 ]; do
              tries=$((tries+1))
              echo "Attempt #$tries to upload $name"
              http_response=$(curl -sS -o /tmp/resp -w '%{http_code}' -X POST -H "Authorization: Bearer $GITHUB_TOKEN" -H "Accept: application/vnd.github+json" -H "Content-Type: application/octet-stream" --data-binary @"$f" "$upload_url?name=$name")
              body=$(cat /tmp/resp || true)
              if [ "$http_response" -ge 200 ] && [ "$http_response" -lt 300 ]; then
                echo "Uploaded $name (status $http_response)"
                break
              fi

              # When an asset with the same name already exists, GitHub returns 422 with code already_exists.
              # Treat that as a successful skip instead of a hard failure.
              if [ "$http_response" -eq 422 ]; then
                if echo "$body" | grep -q '"code":"already_exists"'; then
                  echo "Asset $name already exists in release; skipping"
                  break
                fi
                echo "Upload returned 422 but did not report already_exists. Response: $body"
                if [ "$tries" -lt 3 ]; then
                  sleep $((tries * 2))
                  continue
                else
                  failed=1
                  break
                fi
              fi

              echo "Upload failed (status $http_response). Response: $body"
              if [ "$tries" -lt 3 ]; then
                sleep $((tries * 2))
                continue
              else
                failed=1
                break
              fi
            done
          done

          if [ "$failed" -ne 0 ]; then
            echo "One or more uploads failed"
            exit 1
          fi
